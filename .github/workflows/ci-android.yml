name: Build (Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android, ${{ matrix.build-type }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install NDK 29.0.13113456
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.13113456" > /dev/null

      - name: Bootstrap vcpkg
        run: ./Atmospheric/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            Atmospheric/vcpkg/installed
            Atmospheric/vcpkg/packages
          key: vcpkg-android-${{ hashFiles('Atmospheric/vcpkg.json') }}
          restore-keys: vcpkg-android-

      - name: Build APK (Gradle)
        working-directory: platforms/android
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ matrix.build-type }} --no-daemon
