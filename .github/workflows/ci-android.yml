name: CI – Android

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Android arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NDK 27.3.13750724
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;27.3.13750724" > /dev/null
          echo "ANDROID_NDK=${ANDROID_HOME}/ndk/27.3.13750724" >> "$GITHUB_ENV"

      - name: Bootstrap vcpkg
        run: ./Atmospheric/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            Atmospheric/vcpkg/installed
            Atmospheric/vcpkg/packages
          key: vcpkg-android-arm64-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-android-arm64-

      - name: Generate arm64-android vcpkg triplet
        run: |
          {
            echo 'set(VCPKG_TARGET_ARCHITECTURE arm64)'
            echo 'set(VCPKG_CRT_LINKAGE dynamic)'
            echo 'set(VCPKG_LIBRARY_LINKAGE static)'
            echo 'set(VCPKG_CMAKE_SYSTEM_NAME Android)'
            echo 'set(VCPKG_CMAKE_SYSTEM_VERSION 28)'
            echo "set(VCPKG_CHAINLOAD_TOOLCHAIN_FILE \"$ANDROID_NDK/build/cmake/android.toolchain.cmake\")"
            echo 'set(VCPKG_MAKE_BUILD_TRIPLET "--host=aarch64-linux-android")'
            echo 'set(VCPKG_CMAKE_CONFIGURE_OPTIONS "-DANDROID_ABI=arm64-v8a")'
          } > Atmospheric/triplets/arm64-android.cmake

      - name: Configure
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="Atmospheric/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="$ANDROID_NDK" \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=MinSizeRel

      - name: Build
        run: cmake --build build-android --config MinSizeRel --parallel
