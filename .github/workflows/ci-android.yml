name: Build (Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NDK 29.0.13113456
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.13113456" > /dev/null
          echo "ANDROID_NDK=${ANDROID_HOME}/ndk/29.0.13113456" >> "$GITHUB_ENV"

      - name: Bootstrap vcpkg
        run: ./Atmospheric/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            Atmospheric/vcpkg/installed
            Atmospheric/vcpkg/packages
          key: vcpkg-android-arm64-${{ hashFiles('Atmospheric/vcpkg.json') }}
          restore-keys: vcpkg-android-arm64-

      - name: Configure
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="Atmospheric/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="$ANDROID_NDK" \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=MinSizeRel

      - name: Build
        run: cmake --build build-android --config MinSizeRel --parallel
