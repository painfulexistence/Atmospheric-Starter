<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradientQuad — Atmospheric Engine</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100vw;
            max-height: 100vh;
            border: 0px none;
            background-color: #000000;
            display: block;
        }
        
        #canvas:focus {
            outline: none;
        }
        
        #loading-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        
        #loading-title {
            font-size: 20px;
            font-weight: 600;
            color: #f3f4f6;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        #loading-status {
            font-size: 14px;
            color: #9ca3af;
            font-weight: 300;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <div id="loading-container">
        <div class="spinner" id="loading-spinner"></div>
        <div id="loading-title">GradientQuad</div>
        <div id="loading-status">Downloading...</div>
    </div>

    <script type="text/javascript">
      var statusElement = document.getElementById('loading-status');
      var spinnerElement = document.getElementById('loading-spinner');
      
      var Module = {
        preRun: [],
        postRun: [function() {
          var loader = document.getElementById('loading-container');
          loader.style.opacity = 0;
          setTimeout(function() {
            loader.style.display = 'none';
          }, 500);
        }],
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { 
              if (typeof cleanupRan !== 'undefined' && cleanupRan) {
                  e.preventDefault();
                  return;
              }
              alert('WebGL context lost. Please reload the page.'); 
              e.preventDefault(); 
          }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/\d+\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) { text = m[1]; }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');

      var cleanupRan = false;
      function cleanupWorkers(e) {
        if (e && e.persisted) {
          try {
            var req = indexedDB.open('__bfcache_evict__');
            req.onsuccess = function(ev) { ev.target.result.close(); };
          } catch (_) {}
          return;
        }
        if (cleanupRan) return;
        cleanupRan = true;

        var canvas = document.getElementById('canvas');
        try {
          if (canvas) {
            var gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
              var loseContextExt = gl.getExtension('WEBGL_lose_context');
              if (loseContextExt) loseContextExt.loseContext();
            }
          }
        } catch (e) { console.error(e); }

        try {
          if (canvas) {
            canvas.width = 1; canvas.height = 1;
            if (canvas.parentNode) canvas.parentNode.removeChild(canvas);
          }
        } catch (e) { console.error(e); }

        try {
          if (typeof AL !== 'undefined' && AL.contexts) {
            AL.contexts.forEach(function(ctx) {
              if (ctx && ctx.audioCtx && typeof ctx.audioCtx.close === 'function')
                ctx.audioCtx.close();
            });
          }
        } catch (e) { console.error(e); }

        try {
          if (typeof Module !== 'undefined') {
            Module.HEAPU8 = null; Module.HEAP8  = null;
            Module.HEAPU16= null; Module.HEAP16 = null;
            Module.HEAPU32= null; Module.HEAP32 = null;
            Module.HEAPF32= null; Module.HEAPF64= null;
            if (Module.wasmMemory)  Module.wasmMemory  = null;
            if (Module.asm)        Module.asm         = null;
            if (Module.wasmExports)Module.wasmExports = null;
          }
        } catch (e) { console.error(e); }

        try {
          if (typeof Module !== 'undefined' && typeof Module.terminateAllThreads === 'function')
            Module.terminateAllThreads();
        } catch (e) { console.error(e); }

        if (typeof Module !== 'undefined') Module = null;
      }
      window.addEventListener('pagehide', cleanupWorkers);
      window.addEventListener('unload',   cleanupWorkers);
    </script>
    {{{ SCRIPT }}}
</body>
</html>
